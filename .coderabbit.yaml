reviews:
  profile: "assertive"
  path_filters:
    - "src/main/java/**/*.java"
    - "src/test/java/**/*.java"
  path_instructions:
    - path: "src/test/java/**/*.java"
      instructions: | 
        - Follow Junit 5 best practices for test method naming, such as using descriptive names that clearly indicate the purpose of the test (e.g., `shouldReturnTrueWhenInputIsValid`). 
        - Ensure that test methods are annotated with `@Test` and that any necessary setup or teardown methods are properly annotated with `@BeforeEach`, `@AfterEach`, `@BeforeAll`, or `@AfterAll`.
        - Check for the use of appropriate assertions (e.g., `assertEquals`, `assertTrue`, `assertThrows`) to validate test outcomes, and ensure that tests are focused on a single behavior or scenario for clarity and maintainability.
        - Check for proper use of Mockito for mocking dependencies in unit tests, ensuring that mocks are used appropriately to isolate the unit under test and that interactions with mocks are verified as needed.
  review_status: true
  review_details: true
  pre_merge_checks:
    docstrings:
      mode: "error"
      threshold: 50
    title:
      mode: "warning"
      requirements: "Start with an imperative verb; keep under 50 characters."
    description:
      mode: "error"
    issue_assessment:
      mode: "warning"
    custom_checks:
      - name: "Undocumented Breaking Changes"
        mode: "warning"
        instructions: "Pass/fail criteria: All breaking changes to public APIs, CLI flags, environment variables, configuration keys, database schemas, or HTTP/GraphQL endpoints must be documented in the Breaking Change section of the PR description and in CHANGELOG.md. Exclude purely internal or private changes (e.g., code not exported from package entry points or explicitly marked as internal)."

  